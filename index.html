<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="تطبيق متابعة حفظ ومراجعة القرآن الكريم">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>متابع حفظ القرآن</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --bg3: #0f3460;
      --card: #1e2746;
      --card2: #253256;
      --gold: #d4a843;
      --gold2: #c9952a;
      --green: #2ecc71;
      --red: #e74c3c;
      --cream: #f5e6ca;
      --text: #e8e8e8;
      --text2: #a0a0b8;
      --accent: #d4a843;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0, 0, 0, .3);
      font-family: 'Noto Naskh Arabic', 'Amiri', sans-serif
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      padding-bottom: 80px;
      transition: background .3s, color .3s
    }

    body.light {
      --bg: #ebe5d9;
      --bg2: #ddd4c1;
      --bg3: #c4b394;
      --card: #fff;
      --card2: #f2ead9;
      --text: #1f1f1f;
      --text2: #555555;
      --shadow: 0 4px 20px rgba(0, 0, 0, .12)
    }

    .header {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow)
    }

    .header h1 {
      font-family: 'Amiri', serif;
      font-size: 1.6em;
      color: var(--gold);
      margin-bottom: 2px
    }

    .header .subtitle {
      font-size: .85em;
      color: var(--text2)
    }

    .header-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 10px
    }

    .header-actions button {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all .2s
    }

    .header-actions button:hover {
      background: var(--gold);
      color: var(--bg)
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 12px
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(212, 168, 67, .08);
      transition: transform .2s
    }

    .card:active {
      transform: scale(.98)
    }

    .card-title {
      font-family: 'Amiri', serif;
      font-size: 1.2em;
      color: var(--gold);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .card-title .icon {
      font-size: 1.3em
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: .95em;
      cursor: pointer;
      transition: all .2s;
      font-weight: 600
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #1a1a2e;
      box-shadow: 0 4px 15px rgba(212, 168, 67, .3)
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 168, 67, .4)
    }

    .btn-success {
      background: linear-gradient(135deg, var(--green), #27ae60);
      color: #fff
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold)
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: .85em;
      border-radius: 8px
    }

    .btn-block {
      width: 100%;
      justify-content: center
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .revision-item {
      background: var(--card2);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-right: 3px solid var(--gold);
      animation: slideIn .3s ease
    }

    .revision-item .info {
      flex: 1
    }

    .revision-item .surah {
      font-weight: 600;
      color: var(--cream);
      font-size: 1em
    }

    .revision-item .ayah {
      font-size: .82em;
      color: var(--text2);
      margin-top: 2px
    }

    .revision-item .days-left {
      font-size: .75em;
      color: var(--gold);
      margin-top: 3px
    }

    .revision-item .check-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
      font-size: 1.2em;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0
    }

    .revision-item .check-btn:hover,
    .revision-item .check-btn.done {
      background: var(--green);
      color: #fff
    }

    .counter-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap
    }

    .counter-row label {
      color: var(--text2);
      font-size: .9em;
      min-width: 60px
    }

    .counter-circles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .counter-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: transparent;
      color: var(--gold);
      font-size: .85em;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .counter-circle.filled {
      background: var(--gold);
      color: var(--bg)
    }

    .counter-circle.extra {
      border-style: dashed;
      font-size: .75em
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--card2);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--green));
      border-radius: 4px;
      transition: width .5s ease
    }

    .form-group {
      margin-bottom: 14px
    }

    .form-group label {
      display: block;
      color: var(--text2);
      font-size: .88em;
      margin-bottom: 5px
    }

    .form-group select,
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid rgba(212, 168, 67, .2);
      border-radius: 10px;
      background: var(--card2);
      color: var(--text);
      font-family: inherit;
      font-size: .95em;
      transition: border-color .2s
    }

    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: var(--gold)
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg2);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 env(safe-area-inset-bottom, 8px);
      box-shadow: 0 -4px 20px rgba(0, 0, 0, .3);
      z-index: 100;
      border-top: 1px solid rgba(212, 168, 67, .1)
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: var(--text2);
      font-size: .7em;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      transition: all .2s;
      border: none;
      background: none;
      font-family: inherit
    }

    .tab-item.active {
      color: var(--gold)
    }

    .tab-item .tab-icon {
      font-size: 1.5em
    }

    .page {
      display: none;
      animation: fadeIn .3s ease
    }

    .page.active {
      display: block
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text2)
    }

    .empty-state .empty-icon {
      font-size: 3em;
      margin-bottom: 10px;
      opacity: .5
    }

    .empty-state p {
      font-size: .95em
    }

    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05)
    }

    .setting-item label {
      color: var(--text);
      font-size: .95em
    }

    .setting-item input[type=number] {
      width: 70px;
      text-align: center;
      padding: 8px;
      border: 1.5px solid rgba(212, 168, 67, .2);
      border-radius: 8px;
      background: var(--card2);
      color: var(--text);
      font-family: inherit;
      font-size: .95em
    }

    .toggle {
      position: relative;
      width: 50px;
      height: 28px;
      cursor: pointer
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0
    }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--card2);
      border-radius: 14px;
      transition: .3s
    }

    .toggle .slider:before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--text2);
      bottom: 3px;
      right: 3px;
      transition: .3s
    }

    .toggle input:checked+.slider {
      background: var(--gold)
    }

    .toggle input:checked+.slider:before {
      transform: translateX(-22px);
      background: #fff
    }

    .streak-badge {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .85em;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 600
    }

    .tadabbur-page-display {
      text-align: center;
      padding: 20px;
      background: var(--card2);
      border-radius: 12px;
      margin: 10px 0
    }

    .tadabbur-page-display .page-num {
      font-family: 'Amiri', serif;
      font-size: 3em;
      color: var(--gold);
      line-height: 1
    }

    .tadabbur-page-display .page-label {
      color: var(--text2);
      font-size: .9em;
      margin-top: 5px
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0
    }

    .stat-card {
      background: var(--card2);
      border-radius: 12px;
      padding: 14px;
      text-align: center
    }

    .stat-card .stat-value {
      font-family: 'Amiri', serif;
      font-size: 1.8em;
      color: var(--gold);
      line-height: 1.2
    }

    .stat-card .stat-label {
      font-size: .78em;
      color: var(--text2);
      margin-top: 4px
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s
    }

    .modal-overlay.show {
      display: flex
    }

    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px;
      animation: slideUp .3s ease
    }

    .modal-title {
      font-family: 'Amiri', serif;
      font-size: 1.2em;
      color: var(--gold);
      margin-bottom: 15px;
      text-align: center
    }

    .modal-close {
      position: absolute;
      top: 15px;
      left: 15px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1.3em;
      cursor: pointer
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0)
      }
    }

    .install-banner {
      background: linear-gradient(135deg, var(--bg3), var(--bg2));
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
      display: none;
      text-align: center
    }

    .install-banner.show {
      display: block
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: .9em;
      z-index: 300;
      animation: fadeIn .3s;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .3);
      max-width: 90%;
      text-align: center
    }

    .toast.error {
      background: var(--red)
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px
    }

    .section-header .card-title {
      margin-bottom: 0
    }

    .multi-surah-toggle {
      font-size: .8em;
      color: var(--gold);
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: inherit
    }

    .form-section {
      background: var(--card2);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      border-right: 3px solid var(--gold)
    }

    .form-section-title {
      font-family: 'Amiri', serif;
      font-size: 1em;
      color: var(--gold);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .ayah-hint {
      font-size: .75em;
      color: var(--text2);
      margin-top: 2px
    }

    .slot-entry {
      padding: 10px 0;
      border-bottom: 1px dashed rgba(212, 168, 67, .15);
      margin-bottom: 4px
    }

    .slot-entry:last-child {
      border-bottom: none;
      margin-bottom: 0
    }

    @media(min-width:600px) {
      .container {
        padding: 20px
      }
    }

    .icon svg,
    .tab-icon svg,
    .form-section-title svg,
    .card-title svg,
    .streak-badge svg,
    .stat-label svg,
    .empty-icon svg,
    .setting-item svg,
    .btn svg,
    .check-btn svg,
    .days-left svg {
      vertical-align: -0.125em;
    }

    .header-actions button svg {
      width: 1.1em;
      height: 1.1em;
      vertical-align: middle;
    }

    .tab-icon svg {
      width: 1.5em;
      height: 1.5em;
    }

    .empty-icon svg {
      width: 3em;
      height: 3em;
      opacity: .5;
    }

    .delete-data-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .delete-data-grid .btn {
      font-size: .85em;
      padding: 10px 14px;
      justify-content: flex-start;
      gap: 8px;
    }

    .delete-data-grid .btn svg {
      flex-shrink: 0;
    }

    .btn-danger-outline {
      background: transparent;
      border: 1.5px solid var(--red);
      color: var(--red);
    }

    .btn-danger-outline:hover {
      background: var(--red);
      color: #fff;
    }

    /* Onboarding walkthrough */
    .onboarding-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .4s ease;
    }

    .onboarding-overlay.hidden {
      display: none;
    }

    .onboarding-card {
      background: var(--card);
      border-radius: 20px;
      width: 100%;
      max-width: 440px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px 22px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .4);
      animation: slideUp .4s ease;
      text-align: center;
    }

    .onboarding-card h2 {
      font-family: 'Amiri', serif;
      font-size: 1.5em;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .onboarding-card .ob-subtitle {
      color: var(--text2);
      font-size: .9em;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .onboarding-card .ob-verse {
      font-family: 'Amiri', serif;
      font-size: 1.15em;
      color: var(--gold);
      margin-bottom: 20px;
      line-height: 1.8;
      padding: 12px;
      background: rgba(212, 168, 67, .08);
      border-radius: 12px;
      border: 1px solid rgba(212, 168, 67, .15);
    }

    .ob-steps {
      text-align: right;
      margin-bottom: 20px;
    }

    .ob-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .ob-step:last-child {
      border-bottom: none;
    }

    .ob-step-icon {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 50%;
      background: rgba(212, 168, 67, .12);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
    }

    .ob-step-content h3 {
      font-family: 'Amiri', serif;
      font-size: 1.05em;
      color: var(--gold);
      margin-bottom: 3px;
    }

    .ob-step-content p {
      font-size: .85em;
      color: var(--text2);
      line-height: 1.6;
      margin: 0;
    }

    .ob-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .ob-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--card2);
      transition: all .3s;
    }

    .ob-dot.active {
      background: var(--gold);
      width: 24px;
      border-radius: 4px;
    }

    .ob-nav {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .ob-nav .btn {
      min-width: 100px;
    }
  </style>
</head>

<body>

  <!-- Onboarding Walkthrough -->
  <div class="onboarding-overlay hidden" id="onboarding">
    <div class="onboarding-card">
      <div id="obContent"></div>
      <div class="ob-dots" id="obDots"></div>
      <div class="ob-nav">
        <button class="btn btn-outline btn-sm" id="obPrev" onclick="obNav(-1)">السابق</button>
        <button class="btn btn-primary btn-sm" id="obNext" onclick="obNav(1)">التالي</button>
      </div>
    </div>
  </div>

  <div class="header">
    <h1>﷽</h1>
    <h1>متابع حفظ القرآن</h1>
    <p class="subtitle">ماذا أراجع اليوم؟</p>
    <div class="header-actions">
      <button onclick="toggleTheme()" title="تبديل المظهر" id="themeBtn"></button>
      <button onclick="showPage('settings')" title="الإعدادات" id="settingsBtn"></button>
    </div>
  </div>

  <div class="container">
    <!-- Install Banner -->
    <div class="install-banner" id="installBanner">
      <p style="margin-bottom:8px;color:var(--cream)" id="installText">أضف التطبيق للشاشة الرئيسية</p>
      <button class="btn btn-primary btn-sm" onclick="installApp()">تثبيت</button>
    </div>

    <!-- Dashboard Page -->
    <div class="page active" id="pageDashboard">
      <div id="streakCard" class="card" style="text-align:center;display:none">
        <span class="streak-badge" id="streakBadge"><span id="streakCount">0</span> يوم متتالي</span>
      </div>
      <div id="track1Dashboard"></div>
      <div id="track2Dashboard"></div>
      <div id="track3Dashboard"></div>
      <div id="emptyDashboard" class="empty-state">
        <div class="empty-icon" id="emptyIcon"></div>
        <p>لا توجد مهام اليوم<br>ابدأ بتسجيل جلسة جديدة</p>
      </div>
    </div>

    <!-- Session Logging Page -->
    <div class="page" id="pageSession">
      <div class="card">
        <div class="card-title"><span class="icon" id="sessionIcon"></span> تسجيل جلسة جديدة</div>
        <div class="form-group">
          <label>التاريخ</label>
          <input type="date" id="sessionDate">
        </div>

        <!-- New Memorization Slots -->
        <div class="form-section">
          <div class="section-header">
            <div class="form-section-title" id="newMemTitle"></div>

    function todayISO() { return new Date().toISOString().split('T')[0] }
    function isoToDMY(iso) { const p = iso.split('-'); return p[2] + '/' + p[1] + '/' + p[0] }
    function parseDMY(s) { const p = s.split('/'); return new Date(+p[2], +p[1]-1, +p[0]) }

    function surahPage(idx) { return SURAHS[idx] ? SURAHS[idx][2] : 1 }
    function getSurahEndPage(idx) { return idx < 113 ? SURAHS[idx + 1][2] - 1 : 604 }
    function formatRange(s1, a1, s2, a2) {
      if (s1 === s2) return surahName(s1) + ' : ' + a1 + ' → ' + a2;
      return surahName(s1) + ' (' + a1 + ') → ' + surahName(s2) + ' (' + a2 + ')';
    }
    function getSurahsForPage(page) {
      return SURAHS.filter((_, i) => surahPage(i) <= page && getSurahEndPage(i) >= page).map((_, i) => SURAHS.findIndex(s => s === _));
    }

    // ===== NAVIGATION =====
    let currentPage = 'dashboard';
    function showPage(name) {
      currentPage = name;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      const pageMap = { dashboard: 'pageDashboard', session: 'pageSession', review: 'pageReview', tadabbur: 'pageTadabbur', stats: 'pageStats', settings: 'pageSettings' };
      const tabMap = { dashboard: 'tabDashboard', session: 'tabSession', review: 'tabReview', tadabbur: 'tabTadabbur', stats: 'tabStats' };
      document.getElementById(pageMap[name])?.classList.add('active');
      document.getElementById(tabMap[name])?.classList.add('active');
      if (name === 'dashboard') renderDashboard();
      if (name === 'review') renderReviewPage();
      if (name === 'tadabbur') renderTadabbur();
      if (name === 'stats') renderStats();
      if (name === 'settings') loadSettings();
    }

    // ===== THEME =====
    function toggleTheme() {
      const s = getSettings();
      s.theme = s.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('qt_settings', JSON.stringify(s));
      applyTheme();
    }
    function applyTheme() {
      const s = getSettings();
      document.body.classList.toggle('light', s.theme === 'light');
      document.getElementById('themeBtn').innerHTML = s.theme === 'dark' ? ICONS.moon : ICONS.sun;
      document.getElementById('settingsBtn').innerHTML = ICONS.gear;
    }

    // ===== POPULATE SURAH DROPDOWNS =====
    function surahOptionsHtml() {
      let h = '<option value="">اختر سورة</option>';
      SURAHS.forEach((s, i) => { h += `<option value="${i}">${s[0]} (${s[1]} آية - ص${s[2]})</option>` });
      return h;
    }
    function populateDropdowns() {
      ['cycleSurahStart', 'cycleSurahEnd'].forEach(id => {
        const sel = document.getElementById(id); if (!sel) return; sel.innerHTML = surahOptionsHtml();
      });
      // Initialize default slots
      addSlot('new'); addSlot('old');
    }

    // ===== TOAST NOTIFICATION =====
    function showToast(msg, isError) {
      const t = document.createElement('div'); t.className = 'toast' + (isError ? ' error' : ''); t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
    }

    // ===== DYNAMIC SLOT SYSTEM =====
    let slotCounter = 0;
    function addSlot(type) {
      const container = document.getElementById(type === 'new' ? 'newSlots' : 'oldSlots');
      const id = 'slot_' + (slotCounter++);
      const div = document.createElement('div');
      div.className = 'slot-entry'; div.id = id; div.dataset.type = type;
      div.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <select class="slot-surah" onchange="onSlotSurahChange(this)" style="flex:1;padding:10px 12px;border:1.5px solid rgba(212,168,67,.2);border-radius:10px;background:var(--card2);color:var(--text);font-family:inherit;font-size:.95em">${surahOptionsHtml()}</select>
    <button onclick="removeSlot('${id}')" style="background:none;border:none;color:var(--red);font-size:1.2em;cursor:pointer;padding:4px"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="form-row" style="margin-bottom:4px">
    <div class="form-group" style="margin-bottom:6px"><label>من آية</label><input type="number" class="slot-from" min="1" placeholder="مثال: 1"></div>
    <div class="form-group" style="margin-bottom:6px"><label>إلى آية</label><input type="number" class="slot-to" min="1" placeholder="مثال: 30"></div>
  </div>
  <div class="ayah-hint slot-hint" style="margin-bottom:10px"></div>`;
      container.appendChild(div);
    }
    function removeSlot(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const container = el.parentElement;
      el.remove();
      // Keep at least one slot
      if (container.children.length === 0) {
        const type = container.id === 'newSlots' ? 'new' : 'old';
        addSlot(type);
      }
    }
    function onSlotSurahChange(sel) {
      const slot = sel.closest('.slot-entry');
      const hint = slot.querySelector('.slot-hint');
      const idx = +sel.value;
      if (sel.value !== '' && SURAHS[idx]) {
        hint.textContent = surahName(idx) + ': ' + surahAyahs(idx) + ' آية (ص' + surahPage(idx) + ' → ص' + getSurahEndPage(idx) + ')';
      } else hint.textContent = '';
    }
    function getSlots(type) {
      const container = document.getElementById(type === 'new' ? 'newSlots' : 'oldSlots');
      const slots = [];
      container.querySelectorAll('.slot-entry').forEach(el => {
        const surah = el.querySelector('.slot-surah').value;
        const from = el.querySelector('.slot-from').value;
        const to = el.querySelector('.slot-to').value;
        if (surah !== '' && from !== '' && to !== '') slots.push({ surah: +surah, from: +from, to: +to });
      });
      return slots;
    }
    function clearSlots(type) {
      const container = document.getElementById(type === 'new' ? 'newSlots' : 'oldSlots');
      container.innerHTML = '';
      addSlot(type);
    }

    // ===== TRACK 1: SESSION LOGGING & REVISION =====
    function saveSession() {
      const raw = document.getElementById('sessionDate').value;
      if (!raw) { showToast('أدخل التاريخ', true); return }
      const date = isoToDMY(raw);
      const newSlots = getSlots('new');
      const oldSlots = getSlots('old');

      if (!newSlots.length && !oldSlots.length) { showToast('أدخل بيانات الحفظ أو المراجعة أولاً', true); return }

      // Validate
      for (const s of newSlots) {
        if (s.from < 1 || s.to < 1) { showToast('خطأ: أرقام الآيات يجب أن تكون 1 أو أكبر', true); return }
      }
      for (const s of oldSlots) {
        if (s.from < 1 || s.to < 1) { showToast('خطأ: أرقام الآيات يجب أن تكون 1 أو أكبر', true); return }
      }

      const revisions = getData('qt_revisions');
      newSlots.forEach(s => {
        mergeRevision(revisions, { type: 'new', surahStart: s.surah, ayahStart: s.from, surahEnd: s.surah, ayahEnd: s.to, date, expires: addDays(date, 7) });
      });
      oldSlots.forEach(s => {
        mergeRevision(revisions, { type: 'old', surahStart: s.surah, ayahStart: s.from, surahEnd: s.surah, ayahEnd: s.to, date, expires: addDays(date, 7) });
      });

      setData('qt_revisions', revisions);
      recordActivity(date);
      let msg = 'تم الحفظ: ';
      if (newSlots.length) msg += newSlots.length + ' حفظ جديد';
      if (newSlots.length && oldSlots.length) msg += ' + ';
      if (oldSlots.length) msg += oldSlots.length + ' مراجعة';
      showToast(msg);
      clearSlots('new'); clearSlots('old');
      setTimeout(() => showPage('dashboard'), 800);
    }

    function mergeRevision(arr, item) {
      // check for overlapping items of same type and merge
      for (let i = 0; i < arr.length; i++) {
        const r = arr[i];
        if (r.type === item.type && r.surahStart === item.surahStart && r.surahEnd === item.surahEnd && !isFullyRevised(r)) {
          if (rangesOverlap(r.ayahStart, r.ayahEnd, item.ayahStart, item.ayahEnd)) {
            r.ayahStart = Math.min(r.ayahStart, item.ayahStart);
            r.ayahEnd = Math.max(r.ayahEnd, item.ayahEnd);
            r.expires = parseDMY(item.expires) > parseDMY(r.expires) ? item.expires : r.expires;
            return;
          }
        }
      }
      arr.push({ ...item, id: Date.now() + '_' + Math.random().toString(36).slice(2, 6), revisedDates: [] });
    }

    function rangesOverlap(s1, e1, s2, e2) { return s1 <= e2 && s2 <= e1 }
    function getRevisedDates(r) { return r.revisedDates || (r.revised ? [r.revisedDate || r.date] : []) }
    function hasRevisedToday(r) { return getRevisedDates(r).includes(today()) }
    function isFullyRevised(r) { return r.revised === true }
    function isExpired(r) { return parseDMY(r.expires) < parseDMY(today()) }

    function markRevised(id) {
      const revs = getData('qt_revisions');
      const r = revs.find(x => x.id === id);
      if (r) {
        if (!r.revisedDates) r.revisedDates = [];
        if (!r.revisedDates.includes(today())) r.revisedDates.push(today());
      }
      setData('qt_revisions', revs);
      recordActivity(today());
      renderDashboard();
    }

    // ===== TRACK 2: REVIEW CYCLES =====
    function toggleCycleMode() {
      const mode = document.getElementById('cycleMode').value;
      document.getElementById('cyclePagesMode').style.display = mode === 'pages' ? 'block' : 'none';
      document.getElementById('cycleSurahMode').style.display = mode === 'surah' ? 'block' : 'none';
    }
    function updatePagePreview() {
      const el = document.getElementById('cyclePagePreview');
      const ps = +document.getElementById('cyclePageStart').value;
      const pe = +document.getElementById('cyclePageEnd').value;
      if (!ps && !pe) { el.textContent = ''; return }
      const parts = [];
      if (ps >= 1 && ps <= 604) {
        const s = getSurahsForPage(ps).map(i => surahName(i)).join(' / ');
        parts.push('صفحة ' + ps + ': ' + (s || '—'));
      }
      if (pe >= 1 && pe <= 604 && pe !== ps) {
        const s = getSurahsForPage(pe).map(i => surahName(i)).join(' / ');
        parts.push('صفحة ' + pe + ': ' + (s || '—'));
      }
      if (ps >= 1 && pe >= 1 && ps <= 604 && pe <= 604 && pe >= ps) {
        const allSurahs = new Set();
        for (let i = 0; i < SURAHS.length; i++) {
          if (getSurahEndPage(i) >= ps && surahPage(i) <= pe) allSurahs.add(surahName(i));
        }
        if (allSurahs.size > 0) parts.push('السور: ' + [...allSurahs].join('، '));
      }
      el.textContent = parts.join(' | ');
    }
    function createCycle() {
      const s = getSettings();
      const mode = document.getElementById('cycleMode').value;
      let pageStart, pageEnd, label;
      if (mode === 'pages') {
        pageStart = +document.getElementById('cyclePageStart').value;
        pageEnd = +document.getElementById('cyclePageEnd').value;
        if (!pageStart || !pageEnd || pageStart > pageEnd || pageEnd > 604) { alert('أدخل نطاق صفحات صحيح (1-604)'); return }
        label = 'صفحات ' + pageStart + ' → ' + pageEnd;
      } else {
        const ss = +document.getElementById('cycleSurahStart').value;
        const se = +document.getElementById('cycleSurahEnd').value;
        if (isNaN(ss) || isNaN(se)) { alert('اختر السور'); return }
        pageStart = surahPage(ss);
        pageEnd = getSurahEndPage(se);
        label = surahName(ss) + ' → ' + surahName(se);
      }
      const cycle = {
        id: Date.now(), label, pageStart, pageEnd, totalDays: s.cycleDays, currentDay: 1,
        dailyProgress: [], reads: s.reads, listens: s.listens, completed: false, createdDate: today()
      };
      // init first day
      cycle.dailyProgress.push({ day: 1, readsCompleted: 0, listensCompleted: 0, complete: false });
      const cycles = getData('qt_cycles');
      cycles.push(cycle);
      setData('qt_cycles', cycles);
      renderReviewPage();
    }

    function markCycleRead(cycleId, extra) {
      const cycles = getData('qt_cycles');
      const c = cycles.find(x => x.id === cycleId);
      if (!c) return;
      const dp = c.dailyProgress[c.currentDay - 1];
      if (extra) dp.readsCompleted++;
      else dp.readsCompleted = Math.min(dp.readsCompleted + 1, c.reads);
      checkDayComplete(c);
      setData('qt_cycles', cycles);
      recordActivity(today());
      renderReviewPage();
    }
    function markCycleListen(cycleId, extra) {
      const cycles = getData('qt_cycles');
      const c = cycles.find(x => x.id === cycleId);
      if (!c) return;
      const dp = c.dailyProgress[c.currentDay - 1];
      if (extra) dp.listensCompleted++;
      else dp.listensCompleted = Math.min(dp.listensCompleted + 1, c.listens);
      checkDayComplete(c);
      setData('qt_cycles', cycles);
      recordActivity(today());
      renderReviewPage();
    }
    function checkDayComplete(c) {
      const dp = c.dailyProgress[c.currentDay - 1];
      if (dp.readsCompleted >= c.reads && dp.listensCompleted >= c.listens) dp.complete = true;
    }
    function advanceCycleDay(cycleId) {
      const cycles = getData('qt_cycles');
      const c = cycles.find(x => x.id === cycleId);
      if (!c) return;
      if (c.currentDay >= c.totalDays) { c.completed = true }
      else { c.currentDay++; c.dailyProgress.push({ day: c.currentDay, readsCompleted: 0, listensCompleted: 0, complete: false }) }
      setData('qt_cycles', cycles);
      renderReviewPage();
    }
    function deleteCycle(cycleId) {
      if (!confirm('حذف هذه الدورة؟')) return;
      let cycles = getData('qt_cycles');
      cycles = cycles.filter(x => x.id !== cycleId);
      setData('qt_cycles', cycles);
      renderReviewPage();
    }

    // ===== TRACK 3: TADABBUR =====
    function getTadabburState() {
      try { return JSON.parse(localStorage.getItem('qt_tadabbur') || 'null') || { currentPage: getSettings().tadabburStart, completedPages: [] } }
      catch (e) { return { currentPage: getSettings().tadabburStart, completedPages: [] } }
    }
    function saveTadabburState(st) { localStorage.setItem('qt_tadabbur', JSON.stringify(st)) }
    function markTadabburDone() {
      const st = getTadabburState();
      const s = getSettings();
      if (!st.completedPages.includes(st.currentPage)) st.completedPages.push(st.currentPage);
      st.currentPage = Math.min(st.currentPage + s.tadabburPages, TOTAL_PAGES);
      saveTadabburState(st);
      recordActivity(today());
      renderTadabbur();
      renderDashboard();
    }

    // ===== ACTIVITY / STREAK =====
    function recordActivity(date) {
      const acts = getData('qt_activity');
      if (!acts.includes(date)) acts.push(date);
      setData('qt_activity', acts);
    }
    function getStreak() {
      const acts = getData('qt_activity').sort();
      if (!acts.length) return 0;
      let streak = 0, d = today();
      for (let i = 0; i < 366; i++) {
        if (acts.includes(d)) { streak++; d = addDays(d, -1) }
        else break;
      }
      return streak;
    }

    // ===== CLEANUP EXPIRED =====
    function cleanupExpired() {
      let revs = getData('qt_revisions');
      revs = revs.filter(r => !isExpired(r));
      setData('qt_revisions', revs);
    }

    // ===== RENDER DASHBOARD =====
    function renderDashboard() {
      const s = getSettings();
      const revs = getData('qt_revisions').filter(r => !isExpired(r) && !hasRevisedToday(r));
      const cycles = getData('qt_cycles').filter(c => !c.completed);
      const tad = getTadabburState();
      let hasContent = false;

      // Streak
      const streak = getStreak();
      const streakCard = document.getElementById('streakCard');
      if (streak > 0) { streakCard.style.display = 'block'; document.getElementById('streakCount').textContent = streak }
      else streakCard.style.display = 'none';

      // Track 1
      const t1 = document.getElementById('track1Dashboard');
      if (s.track1 && revs.length) {
        hasContent = true;
        let h = '<div class="card"><div class="card-title"><span class="icon">' + ICONS.book + '</span> مراجعة اليوم</div>';
        revs.forEach(r => {
          const daysLeft = daysDiff(r.expires, today());
          const rd = getRevisedDates(r);
          const doneCount = rd.length;
          h += `<div class="revision-item">
        <div class="info"><div class="surah">${formatRange(r.surahStart, r.ayahStart, r.surahEnd, r.ayahEnd)}</div>
        <div class="ayah">${r.type === 'new' ? 'حفظ جديد' : 'مراجعة قديمة'} — ${doneCount}/7 أيام</div>
        <div class="days-left">${ICONS.clock} ${daysLeft} أيام متبقية</div></div>
        <button class="check-btn" onclick="markRevised('${r.id}')">${ICONS.check}</button></div>`;
        });
        h += '</div>'; t1.innerHTML = h;
      } else t1.innerHTML = '';

      // Track 2
      const t2 = document.getElementById('track2Dashboard');
      if (s.track2 && cycles.length) {
        hasContent = true;
        let h = '';
        cycles.forEach(c => {
          const dp = c.dailyProgress[c.currentDay - 1] || { readsCompleted: 0, listensCompleted: 0 };
          const pct = Math.round(((c.currentDay - 1) / c.totalDays) * 100);
          const cSurahs = []; for (let i = 0; i < SURAHS.length; i++) { if (getSurahEndPage(i) >= c.pageStart && surahPage(i) <= c.pageEnd) cSurahs.push(surahName(i)) }
          const cSurahHint = cSurahs.length ? cSurahs.join('، ') : '';
          h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.refresh}</span> ${c.label}</div>
        ${cSurahHint ? `<div style="color:var(--gold);font-size:.8em;margin-bottom:6px;opacity:.8">${cSurahHint}</div>` : ''}
        <div style="color:var(--text2);font-size:.9em;margin-bottom:8px">اليوم ${c.currentDay} / ${c.totalDays}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="counter-row"><label>القراءة</label><div class="counter-circles">`;
          for (let i = 0; i < Math.max(c.reads, dp.readsCompleted); i++) {
            const filled = i < dp.readsCompleted ? 'filled' : '';
            const extra = i >= c.reads ? 'extra' : '';
            h += `<div class="counter-circle ${filled} ${extra}" onclick="markCycleRead(${c.id},${i >= c.reads})">${i + 1}</div>`;
          }
          h += `<div class="counter-circle extra" onclick="markCycleRead(${c.id},true)">+</div></div></div>`;
          h += `<div class="counter-row"><label>الاستماع</label><div class="counter-circles">`;
          for (let i = 0; i < Math.max(c.listens, dp.listensCompleted); i++) {
            const filled = i < dp.listensCompleted ? 'filled' : '';
            const extra = i >= c.listens ? 'extra' : '';
            h += `<div class="counter-circle ${filled} ${extra}" onclick="markCycleListen(${c.id},${i >= c.listens})">${i + 1}</div>`;
          }
          h += `<div class="counter-circle extra" onclick="markCycleListen(${c.id},true)">+</div></div></div>`;
          if (dp.complete) h += `<button class="btn btn-success btn-sm btn-block" onclick="advanceCycleDay(${c.id})" style="margin-top:8px">${c.currentDay >= c.totalDays ? ICONS.checkCircle + ' إنهاء الدورة' : ICONS.skipForward + ' اليوم التالي'}</button>`;
          h += `</div>`;
        });
        t2.innerHTML = h;
      } else t2.innerHTML = '';

      // Track 3
      const t3 = document.getElementById('track3Dashboard');
      if (s.track3) {
        hasContent = true;
        const surahs = getSurahsForPage(tad.currentPage);
        const surahInfo = surahs.length ? surahs.map(i => surahName(i)).join(' / ') : '';
        t3.innerHTML = `<div class="card"><div class="card-title"><span class="icon">${ICONS.thought}</span> تدبر اليوم</div>
      <div class="tadabbur-page-display"><div class="page-num">${tad.currentPage}</div>
      <div class="page-label">صفحة ${tad.currentPage} من ${TOTAL_PAGES}${surahInfo ? ' — ' + surahInfo : ''}</div></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(tad.completedPages.length / TOTAL_PAGES * 100)}%"></div></div>
      <div style="text-align:center;color:var(--text2);font-size:.85em;margin:5px 0">${tad.completedPages.length} / ${TOTAL_PAGES} صفحة</div>
      <button class="btn btn-primary btn-block" onclick="markTadabburDone()">${ICONS.checkCircle} تم التدبر</button></div>`;
      } else t3.innerHTML = '';

      document.getElementById('emptyDashboard').style.display = hasContent ? 'none' : 'block';
    }

    // ===== RENDER REVIEW PAGE =====
    function renderReviewPage() {
      const cycles = getData('qt_cycles');
      const active = cycles.filter(c => !c.completed);
      const completed = cycles.filter(c => c.completed);
      const el = document.getElementById('activeCycle');
      if (!active.length && !completed.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">' + ICONS.refresh + '</div><p>لا توجد دورات مراجعة<br>أنشئ دورة جديدة</p></div>'; return }
      let h = '';
      active.forEach(c => {
        const dp = c.dailyProgress[c.currentDay - 1] || { readsCompleted: 0, listensCompleted: 0 };
        const pct = Math.round(((c.currentDay - 1) / c.totalDays) * 100);
        const rSurahs = []; for (let i = 0; i < SURAHS.length; i++) { if (getSurahEndPage(i) >= c.pageStart && surahPage(i) <= c.pageEnd) rSurahs.push(surahName(i)) }
        const rSurahHint = rSurahs.length ? rSurahs.join('، ') : '';
        h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.refresh}</span> ${c.label}
      <button class="btn btn-danger btn-sm" style="margin-right:auto;font-size:.75em" onclick="deleteCycle(${c.id})">${ICONS.trash}</button></div>
      ${rSurahHint ? `<div style="color:var(--gold);font-size:.8em;margin-bottom:6px;opacity:.8">${rSurahHint}</div>` : ''}
      <div style="color:var(--text2);font-size:.9em">اليوم ${c.currentDay} / ${c.totalDays}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="counter-row"><label>القراءة</label><div class="counter-circles">`;
        for (let i = 0; i < Math.max(c.reads, dp.readsCompleted); i++) {
          h += `<div class="counter-circle ${i < dp.readsCompleted ? 'filled' : ''} ${i >= c.reads ? 'extra' : ''}" onclick="markCycleRead(${c.id},${i >= c.reads})">${i + 1}</div>`;
        }
        h += `<div class="counter-circle extra" onclick="markCycleRead(${c.id},true)">+</div></div></div>`;
        h += `<div class="counter-row"><label>الاستماع</label><div class="counter-circles">`;
        for (let i = 0; i < Math.max(c.listens, dp.listensCompleted); i++) {
          h += `<div class="counter-circle ${i < dp.listensCompleted ? 'filled' : ''} ${i >= c.listens ? 'extra' : ''}" onclick="markCycleListen(${c.id},${i >= c.listens})">${i + 1}</div>`;
        }
        h += `<div class="counter-circle extra" onclick="markCycleListen(${c.id},true)">+</div></div></div>`;
        if (dp.complete) h += `<button class="btn btn-success btn-block" onclick="advanceCycleDay(${c.id})" style="margin-top:8px">${c.currentDay >= c.totalDays ? ICONS.checkCircle + ' إنهاء الدورة' : ICONS.skipForward + ' اليوم التالي'}</button>`;
        h += `</div>`;
      });
      if (completed.length) {
        h += '<div class="card"><div class="card-title"><span class="icon">' + ICONS.checkCircle + '</span> الدورات المكتملة</div>';
        completed.slice(-5).reverse().forEach(c => { h += `<div class="revision-item"><div class="info"><div class="surah">${c.label}</div><div class="ayah">${c.createdDate}</div></div><button class="btn btn-danger btn-sm" onclick="deleteCycle(${c.id})">${ICONS.trash}</button></div>` });
        h += '</div>';
      }
      el.innerHTML = h;
    }

    // ===== RENDER TADABBUR =====
    function renderTadabbur() {
      const tad = getTadabburState(); const s = getSettings();
      const surahs = [];
      for (let i = 0; i < SURAHS.length; i++) { if (surahPage(i) <= tad.currentPage && getSurahEndPage(i) >= tad.currentPage) surahs.push(i) }
      const surahInfo = surahs.map(i => surahName(i)).join(' / ');
      document.getElementById('tadabburContent').innerHTML = `
    <div class="card"><div class="card-title"><span class="icon">${ICONS.thought}</span> التدبر اليومي</div>
    <div class="tadabbur-page-display"><div class="page-num">${tad.currentPage}</div>
    <div class="page-label">صفحة ${tad.currentPage} من ${TOTAL_PAGES}</div>
    <div style="color:var(--gold);margin-top:5px">${surahInfo}</div></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(tad.completedPages.length / TOTAL_PAGES * 100)}%"></div></div>
    <div style="text-align:center;color:var(--text2);font-size:.85em;margin:8px 0">تم تدبر ${tad.completedPages.length} من ${TOTAL_PAGES} صفحة</div>
    <button class="btn btn-primary btn-block" onclick="markTadabburDone()">${ICONS.checkCircle} تم التدبر</button></div>
    <div class="card"><div class="card-title"><span class="icon">${ICONS.barChart}</span> إحصائيات التدبر</div>
    <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${tad.completedPages.length}</div><div class="stat-label">صفحات مكتملة</div></div>
    <div class="stat-card"><div class="stat-value">${TOTAL_PAGES - tad.completedPages.length}</div><div class="stat-label">صفحات متبقية</div></div>
    <div class="stat-card"><div class="stat-value">${Math.round(tad.completedPages.length / TOTAL_PAGES * 100)}%</div><div class="stat-label">نسبة الإنجاز</div></div>
    <div class="stat-card"><div class="stat-value">${s.tadabburPages}</div><div class="stat-label">صفحات يومياً</div></div>
    </div></div>`;
    }

    // ===== RENDER STATS =====
    function renderStats() {
      const revs = getData('qt_revisions');
      const cycles = getData('qt_cycles');
      const tad = getTadabburState();
      const s = getSettings();
      const streak = getStreak();
      const activeDays = getData('qt_activity').length;

      // Revision stats
      const activeRevs = revs.filter(r => !isExpired(r) && !hasRevisedToday(r)).length;
      const completedRevs = revs.filter(r => getRevisedDates(r).length > 0).length;
      const totalCycles = cycles.length;
      const completedCycles = cycles.filter(c => c.completed).length;
      const activeCycles = cycles.filter(c => !c.completed).length;

      // Compute total ayahs revised (unique per surah from completed revisions)
      const surahAyahsCovered = {}; // surahIdx -> Set of ayah numbers
      const surahRevCount = {};     // surahIdx -> count of full revisions (where whole surah revised)
      revs.filter(r => getRevisedDates(r).length > 0).forEach(r => {
        const si = r.surahStart;
        if (!surahAyahsCovered[si]) surahAyahsCovered[si] = new Set();
        for (let a = r.ayahStart; a <= r.ayahEnd; a++) surahAyahsCovered[si].add(a);
      });

      // Count fully revised surahs and build "most revised" list
      let fullyRevisedCount = 0;
      const surahCompletionList = [];
      for (const [si, ayahs] of Object.entries(surahAyahsCovered)) {
        const idx = +si;
        const total = surahAyahs(idx);
        const covered = ayahs.size;
        const pct = Math.min(Math.round(covered / total * 100), 100);
        if (covered >= total) fullyRevisedCount++;
        surahCompletionList.push({ idx, covered, total, pct });
      }

      // Total unique ayahs
      let totalAyahsRevised = 0;
      for (const ayahs of Object.values(surahAyahsCovered)) totalAyahsRevised += ayahs.size;
      const totalAyahsQuran = SURAHS.reduce((s, x) => s + x[1], 0);

      // Top surahs: only show those fully revised, sorted by revision count
      const fullSurahRevCount = {};
      revs.filter(r => getRevisedDates(r).length > 0).forEach(r => {
        const si = r.surahStart;
        const total = surahAyahs(si);
        if (surahAyahsCovered[si] && surahAyahsCovered[si].size >= total) {
          fullSurahRevCount[si] = (fullSurahRevCount[si] || 0) + 1;
        }
      });
      const topFullSurahs = Object.entries(fullSurahRevCount).sort((a, b) => b[1] - a[1]).slice(0, 5);

      // Partial progress surahs (not fully revised yet)
      const partialSurahs = surahCompletionList.filter(s => s.pct > 0 && s.pct < 100).sort((a, b) => b.pct - a.pct).slice(0, 5);

      // Cycle progress stats
      let totalCycleDays = 0, completedCycleDays = 0;
      cycles.forEach(c => {
        totalCycleDays += c.totalDays;
        completedCycleDays += c.completed ? c.totalDays : (c.currentDay - 1);
      });

      // === BUILD HTML ===
      let h = `<div class="card"><div class="card-title"><span class="icon">${ICONS.barChart}</span> الإحصائيات العامة</div>
    <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${streak}</div><div class="stat-label">${ICONS.flame} أيام متتالية</div></div>
    <div class="stat-card"><div class="stat-value">${activeDays}</div><div class="stat-label">${ICONS.calendar} أيام نشاط</div></div>
    <div class="stat-card"><div class="stat-value">${totalAyahsRevised}</div><div class="stat-label">${ICONS.book} آيات تمت مراجعتها</div></div>
    <div class="stat-card"><div class="stat-value">${fullyRevisedCount}</div><div class="stat-label">${ICONS.checkCircle} سور كاملة</div></div>
    </div></div>`;

      // Memorization & Revision track
      h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.book}</span> الحفظ والمراجعة</div>
    <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${revs.length}</div><div class="stat-label">${ICONS.edit} جلسات مسجلة</div></div>
    <div class="stat-card"><div class="stat-value">${activeRevs}</div><div class="stat-label">${ICONS.clock} مراجعات نشطة</div></div>
    <div class="stat-card"><div class="stat-value">${completedRevs}</div><div class="stat-label">${ICONS.checkCircle} مراجعات مكتملة</div></div>
    <div class="stat-card"><div class="stat-value">${Math.round(totalAyahsRevised / totalAyahsQuran * 100)}%</div><div class="stat-label">${ICONS.barChart} تغطية القرآن</div></div>
    </div></div>`;

      // Review cycles track
      if (totalCycles > 0) {
        h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.refresh}</span> دورات المراجعة</div>
    <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${activeCycles}</div><div class="stat-label">${ICONS.clock} دورات نشطة</div></div>
    <div class="stat-card"><div class="stat-value">${completedCycles}</div><div class="stat-label">${ICONS.checkCircle} دورات مكتملة</div></div>
    <div class="stat-card"><div class="stat-value">${completedCycleDays}</div><div class="stat-label">${ICONS.calendar} أيام منجزة</div></div>
    <div class="stat-card"><div class="stat-value">${totalCycleDays > 0 ? Math.round(completedCycleDays / totalCycleDays * 100) : 0}%</div><div class="stat-label">${ICONS.barChart} نسبة الإنجاز</div></div>
    </div></div>`;
      }

      // Tadabbur track
      if (s.track3) {
        h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.thought}</span> التدبر</div>
    <div class="stats-grid">
    <div class="stat-card"><div class="stat-value">${tad.completedPages.length}</div><div class="stat-label">${ICONS.checkCircle} صفحات مكتملة</div></div>
    <div class="stat-card"><div class="stat-value">${TOTAL_PAGES - tad.completedPages.length}</div><div class="stat-label">${ICONS.clock} صفحات متبقية</div></div>
    <div class="stat-card"><div class="stat-value">${Math.round(tad.completedPages.length / TOTAL_PAGES * 100)}%</div><div class="stat-label">${ICONS.barChart} نسبة الإنجاز</div></div>
    <div class="stat-card"><div class="stat-value">${s.tadabburPages}</div><div class="stat-label">${ICONS.bookOpen} صفحات يومياً</div></div>
    </div></div>`;
      }

      // Top fully revised surahs
      if (topFullSurahs.length) {
        h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.star}</span> أكثر السور مراجعة (كاملة)</div>`;
        topFullSurahs.forEach(([idx, count]) => {
          const pct = Math.round(count / topFullSurahs[0][1] * 100);
          h += `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:3px"><span>${surahName(+idx)}</span><span style="color:var(--gold)">${count} مراجعات</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
        });
        h += '</div>';
      }

      // Partial progress surahs
      if (partialSurahs.length) {
        h += `<div class="card"><div class="card-title"><span class="icon">${ICONS.sparkles}</span> سور قيد المراجعة</div>`;
        partialSurahs.forEach(s => {
          h += `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:.9em;margin-bottom:3px"><span>${surahName(s.idx)}</span><span style="color:var(--gold)">${s.covered} / ${s.total} آية (${s.pct}%)</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${s.pct}%"></div></div></div>`;
        });
        h += '</div>';
      }

      document.getElementById('statsContent').innerHTML = h;
    }

    // ===== PWA INSTALL =====
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBanner').classList.add('show') });
    function installApp() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBanner').classList.remove('show') }) } }

    // ===== DELETE DATA =====
    function deleteDataType(key, label) {
      if (!confirm('هل أنت متأكد من حذف ' + label + '؟')) return;
      localStorage.removeItem(key);
      showToast('تم حذف ' + label);
      renderDashboard();
    }
    function deleteAllData() {
      if (!confirm('هل أنت متأكد من حذف جميع البيانات؟')) return;
      localStorage.clear();
      location.reload();
    }

    // ===== INIT ICONS =====
    function initIcons() {
      const map = {
        settingsBtn: ICONS.gear,
        settingsIcon: ICONS.gear,
        sessionIcon: ICONS.edit,
        newCycleIcon: ICONS.refresh,
        emptyIcon: ICONS.bookOpen,
        streakBadge: ICONS.flame + ' <span id="streakCount">0</span> يوم متتالي',
        newMemTitle: ICONS.sparkles + ' الحفظ الجديد',
        oldRevTitle: ICONS.bookOpen + ' المراجعة القديمة',
        saveSessionBtn: ICONS.save + ' حفظ الجلسة',
        createCycleBtn: ICONS.plusCircle + ' إنشاء الدورة',
        dataIcon: ICONS.database,
        revSettingsIcon: ICONS.bookOpen,
        tadSettingsIcon: ICONS.thought,
        setTrack1Icon: ICONS.book,
        setTrack2Icon: ICONS.bookOpen,
        setTrack3Icon: ICONS.thought,
        tabIconHome: ICONS.home,
        tabIconSession: ICONS.edit,
        tabIconReview: ICONS.refresh,
        tabIconTadabbur: ICONS.thought,
        tabIconStats: ICONS.barChart,
        delRevIcon: ICONS.trash,
        delCycIcon: ICONS.trash,
        delTadIcon: ICONS.trash,
        delActIcon: ICONS.trash,
        delAllIcon: ICONS.trash,
      };
      for (const [id, html] of Object.entries(map)) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = html;
      }
    }

    // ===== ONBOARDING =====
    const OB_PAGES = [
      {
        html: `<h2>بسم الله الرحمن الرحيم</h2>
          <div class="ob-subtitle">أهلاً بك في تطبيق متابع حفظ القرآن<br>رفيقك اليومي في رحلة الحفظ والمراجعة</div>
          <div class="ob-verse">« وَلَقَدْ يَسَّرْنَا الْقُرْآنَ لِلذَِّكْرِ فَهَلْ مِن مُدَّكِرٍ »<br><span style="font-size:.8em;color:var(--text2)">سورة القمر - 17</span></div>
          <p style="color:var(--text2);font-size:.88em;line-height:1.7">هذا التطبيق صُمّم ليكون بسيطاً وسريعاً، يساعدك على الانتظام في الحفظ والمراجعة حتى لا تضيع ما حفظت، بإذن الله.</p>`
      },
      {
        html: `<h2>تسجيل الجلسات</h2>
          <div class="ob-subtitle">الخطوة الأولى: سجّل ما حفظت وراجعت</div>
          <div class="ob-steps">
            <div class="ob-step"><div class="ob-step-icon">${ICONS.sparkles}</div><div class="ob-step-content"><h3>الحفظ الجديد</h3><p>سجّل الآيات التي حفظتها اليوم. اختر السورة وحدد من آية إلى آية.</p></div></div>
            <div class="ob-step"><div class="ob-step-icon">${ICONS.bookOpen}</div><div class="ob-step-content"><h3>المراجعة القديمة</h3><p>سجّل ما راجعته مع الشيخ أو بمفردك. يمكنك إضافة أكثر من سورة في نفس الجلسة.</p></div></div>
          </div>
          <div class="ob-verse" style="font-size:.95em">« تَعَاهَدُوا هَذَا الْقُرْآنَ، فَوَالَّذِي نَفْسِي بِيَدِهِ لَهُوَ أَشَدُّ تَفَصَّياً مِنَ الْإِبِلِ فِي عُقُلِهَا »<br><span style="font-size:.8em;color:var(--text2)">رواه البخاري ومسلم</span></div>`
      },
      {
        html: `<h2>المراجعة المتكررة</h2>
          <div class="ob-subtitle">سرّ تثبيت الحفظ: التكرار المتباعد</div>
          <div class="ob-steps">
            <div class="ob-step"><div class="ob-step-icon">${ICONS.clock}</div><div class="ob-step-content"><h3>7 أيام تلقائية</h3><p>عند تسجيل جلسة، يُنشئ التطبيق مهام مراجعة لمدة 7 أيام. هذا يعتمد على مبدأ التكرار المتباعد (Spaced Repetition) الذي أثبت فعاليته في تثبيت المحفوظات.</p></div></div>
            <div class="ob-step"><div class="ob-step-icon">${ICONS.home}</div><div class="ob-step-content"><h3>الصفحة الرئيسية</h3><p>كل يوم ستجد ما يجب مراجعته بوضوح. اضغط علامة ✔ عند الإتمام.</p></div></div>
          </div>
          <p style="color:var(--text2);font-size:.85em;line-height:1.7">المراجعة المنتظمة هي الفرق بين حافظ يحفظ وينسى، وحافظ يحفظ ويُثبّت.</p>`
      },
      {
        html: `<h2>دورات المراجعة الشاملة</h2>
          <div class="ob-subtitle">للمحفوظ القديم الذي يحتاج تثبيتاً مستمراً</div>
          <div class="ob-steps">
            <div class="ob-step"><div class="ob-step-icon">${ICONS.refresh}</div><div class="ob-step-content"><h3>أنشئ دورة</h3><p>حدد نطاق صفحات أو سور تريد مراجعتها. التطبيق سيعرض لك السور الموجودة في كل صفحة.</p></div></div>
            <div class="ob-step"><div class="ob-step-icon">${ICONS.checkCircle}</div><div class="ob-step-content"><h3>تابع يومياً</h3><p>سجّل عدد مرات القراءة والاستماع كل يوم. عند إكمال المطلوب انتقل لليوم التالي حتى تُنهي الدورة.</p></div></div>
          </div>
          <p style="color:var(--text2);font-size:.85em;line-height:1.7">الدورات تساعدك على تغطية كل ما حفظته سابقاً بشكل منظم لا يفلت منك شيء.</p>`
      },
      {
        html: `<h2>ابدأ الآن</h2>
          <div class="ob-verse">« خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ »<br><span style="font-size:.8em;color:var(--text2)">رواه البخاري</span></div>
          <div class="ob-steps">
            <div class="ob-step"><div class="ob-step-icon">1</div><div class="ob-step-content"><p>اذهب إلى <strong>جلسة</strong> وسجّل أول حفظ أو مراجعة</p></div></div>
            <div class="ob-step"><div class="ob-step-icon">2</div><div class="ob-step-content"><p>اذهب إلى <strong>مراجعة</strong> وأنشئ دورة لمحفوظك القديم</p></div></div>
            <div class="ob-step"><div class="ob-step-icon">3</div><div class="ob-step-content"><p>تابع ال<strong>رئيسية</strong> يومياً وأتمّ مهامك</p></div></div>
          </div>
          <p style="color:var(--gold);font-size:.95em;font-weight:600;margin-bottom:8px">بارك الله في همّتك وثبّتك على الحفظ!</p>`
      }
    ];
    let obStep = 0;
    function renderOB() {
      document.getElementById('obContent').innerHTML = OB_PAGES[obStep].html;
      const dots = document.getElementById('obDots');
      dots.innerHTML = OB_PAGES.map((_, i) => `<div class="ob-dot${i === obStep ? ' active' : ''}"></div>`).join('');
      document.getElementById('obPrev').style.display = obStep === 0 ? 'none' : '';
      document.getElementById('obNext').textContent = obStep === OB_PAGES.length - 1 ? 'ابدأ الآن' : 'التالي';
    }
    function obNav(dir) {
      if (dir === 1 && obStep === OB_PAGES.length - 1) {
        document.getElementById('onboarding').classList.add('hidden');
        localStorage.setItem('qt_onboarded', '1');
        return;
      }
      obStep = Math.max(0, Math.min(OB_PAGES.length - 1, obStep + dir));
      renderOB();
    }
    function showOnboarding() {
      obStep = 0;
      document.getElementById('onboarding').classList.remove('hidden');
      renderOB();
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', () => {
      initIcons(); applyTheme(); populateDropdowns(); cleanupExpired(); loadSettings();
      const sd = document.getElementById('sessionDate');
      sd.value = todayISO();
      sd.max = todayISO();
      renderDashboard();
      if (!localStorage.getItem('qt_onboarded')) showOnboarding();
      if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(e => console.log('SW reg failed:', e)) }
    });
  </script>
</body>
